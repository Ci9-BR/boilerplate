version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: boilerplate-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Marin@9988
      POSTGRES_DB: boilerplate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack
    container_name: boilerplate-aws
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,sns,dynamodb
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
    volumes:
      - "./infra/localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

volumes:
  postgres_data:
